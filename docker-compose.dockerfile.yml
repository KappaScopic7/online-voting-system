services:
    db:
        image: postgres:16
        container_name: ovs-postgres
        restart: always
        environment:
            POSTGRES_USER: ovs
            POSTGRES_PASSWORD: ovs
            POSTGRES_DB: ovs
            TZ: Asia/Tokyo
        ports:
            - "5432:5432"
        volumes:
            - ovs_pg:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ovs -d ovs"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks: [ovsnet]

    backend:
        image: ovs-backend:latest
        container_name: ovs-backend
        restart: always
        depends_on:
            db:
                condition: service_healthy
        environment:
            SPRING_PROFILES_ACTIVE: demo
            SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ovs
            SPRING_DATASOURCE_USERNAME: ovs
            SPRING_DATASOURCE_PASSWORD: ovs
            SECURITY_JWT_SECRET: "change-this-to-a-long-random-secret-key-1234567890"
            SECURITY_JWT_EXPIRATION_MINUTES: "120"
        ports:
            - "8080:8080"
        networks: [ovsnet]

    frontend:
        image: ovs-frontend:latest
        container_name: ovs-frontend
        restart: always
        depends_on: [backend]
        ports:
            - "8081:80"
        networks: [ovsnet]

volumes:
    ovs_pg:

networks:
    ovsnet:
