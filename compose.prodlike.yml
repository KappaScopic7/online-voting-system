services:
    db:
        image: postgres:16
        container_name: ovs-postgres-prodlike
        restart: always
        environment:
            POSTGRES_USER: ovs
            POSTGRES_PASSWORD: ovs
            POSTGRES_DB: ovs
            TZ: Asia/Tokyo
        volumes:
            - ovs_pg_prodlike:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ovs -d ovs"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks: [ovsnet]

    backend:
        build:
            context: ./backend
            dockerfile: Dockerfile
        image: ovs-backend:local
        container_name: ovs-backend-prodlike
        restart: always
        depends_on:
            db:
                condition: service_healthy
        environment:
            SPRING_PROFILES_ACTIVE: prodlike
            SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ovs
            SPRING_DATASOURCE_USERNAME: ovs
            SPRING_DATASOURCE_PASSWORD: ovs
            APP_CORS_ALLOWED_ORIGINS: "http://34.204.218.152,http://localhost,http://localhost:8081,http://localhost:5173,http://127.0.0.1:5173"
            SECURITY_JWT_SECRET: "change-this-to-a-long-random-secret-key-1234567890"
            SECURITY_JWT_EXPIRATION_MINUTES: "120"
            SPRING_JPA_HIBERNATE_DDL_AUTO: update
            SPRING_JPA_SHOW_SQL: "false"
            OVS_SEED_ENABLED: "true"

        ports:
            - "8080:8080"
        networks: [ovsnet]

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
            args:
                VITE_API_BASE_URL: /api
        image: ovs-frontend:local
        container_name: ovs-frontend-prodlike
        restart: always
        depends_on: [backend]
        ports:
            - "8081:80"
        networks: [ovsnet]

volumes:
    ovs_pg_prodlike:

networks:
    ovsnet:
