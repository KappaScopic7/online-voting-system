spring:
    profiles:
        active: demo

    datasource:
        url: jdbc:postgresql://localhost:5432/ovs
        username: ovs
        password: ovs

    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                "[format_sql]": true
            database-platform: org.hibernate.dialect.PostgreSQLDialect

security:
    jwt:
        secret: "change-this-to-a-long-random-secret-key-1234567890"
        expiration-minutes: 120

logging:
    level:
        "[org.springframework.security]": DEBUG
        "[com.bteam.ovs.auth.security.JwtAuthenticationFilter]": DEBUG
