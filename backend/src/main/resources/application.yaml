spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/ovs
        username: ovs
        password: ovs

    jpa:
        database-platform: org.hibernate.dialect.PostgreSQLDialect
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true

security:
    jwt:
        secret: "change-this-to-a-long-random-secret-key-1234567890"
        expiration-minutes: 120
